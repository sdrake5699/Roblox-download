<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBLOX HACK - AUTO SYNC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            background: linear-gradient(90deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        .game-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            overflow-x: auto;
            padding-bottom: 10px;
        }
        .game-tab {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s;
        }
        .game-tab.active {
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            font-weight: bold;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .game-card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .add-game-form {
            margin-top: 40px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        button {
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,219,222,0.4);
        }
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 15px 25px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
        }
        .error {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ROBLOX HACK MANAGER</h1>
        
        <!-- Tab Game -->
        <div class="game-tabs" id="gameTabs">
            <div class="game-tab active" data-tab="all">Tất cả</div>
            <div class="game-tab" data-tab="phổ biến">Phổ biến</div>
            <div class="game-tab" data-tab="mới nhất">Mới nhất</div>
            <button id="addTabBtn" style="margin-left: auto;">+ Thêm Tab</button>
        </div>
        
        <!-- Danh sách game -->
        <div class="games-grid" id="gamesGrid">
            <!-- Game sẽ được render ở đây -->
        </div>
        
        <!-- Form thêm game -->
        <div class="add-game-form">
            <h2>Thêm Game Mới</h2>
            <div class="form-group">
                <label for="gameTitle">Tên Game</label>
                <input type="text" id="gameTitle" placeholder="Nhập tên game" required>
            </div>
            <div class="form-group">
                <label for="gameDescription">Mô tả</label>
                <textarea id="gameDescription" rows="3" required></textarea>
            </div>
            <div class="form-group">
                <label for="gameLink">Link tải</label>
                <input type="url" id="gameLink" placeholder="https://" required>
            </div>
            <div class="form-group">
                <label for="gameTab">Chọn Tab</label>
                <select id="gameTab">
                    <option value="phổ biến">Phổ biến</option>
                    <option value="mới nhất">Mới nhất</option>
                </select>
            </div>
            <button id="addGameBtn">Thêm Game</button>
        </div>
    </div>
    
    <div class="notification" id="notification"></div>

    <script>
        // ========= CẤU HÌNH GITHUB ========= //
        const GITHUB_CONFIG = {
            USERNAME: "sdrake5699", // 👈 THAY BẰNG USERNAME CỦA BẠN
            REPO: "Roblox-download",          // 👈 ĐÚNG TÊN REPOSITORY
            TOKEN: "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",       // 👈 THAY BẰNG TOKEN MỚI CỦA BẠN
            get API_URL() {
                return `https://api.github.com/repos/${this.USERNAME}/${this.REPO}/contents/games.json`;
            }
        };

        // ========= BIẾN TOÀN CỤC ========= //
        let currentGames = {
            "all": [],
            "phổ biến": [],
            "mới nhất": []
        };
        let currentTab = "all";

        // ========= KHỞI TẠO ỨNG DỤNG ========= //
        document.addEventListener('DOMContentLoaded', async () => {
            await loadGames();
            renderGames();
            setupEventListeners();
        });

        // ========= HÀM CHÍNH ========= //
        async function loadGames() {
            try {
                showNotification("Đang tải dữ liệu...");
                const response = await fetch(GITHUB_CONFIG.API_URL, {
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    currentGames = JSON.parse(atob(data.content));
                    showNotification("Tải dữ liệu thành công!");
                } else if (response.status === 404) {
                    // Nếu file chưa tồn tại, tạo file mới
                    await saveGames();
                } else {
                    throw new Error(await response.text());
                }
            } catch (error) {
                console.error("Lỗi tải dữ liệu:", error);
                showNotification("Lỗi tải dữ liệu: " + error.message, "error");
            }
        }

        async function saveGames() {
            try {
                // 1. Lấy SHA file hiện tại (nếu có)
                let sha = null;
                try {
                    const getRes = await fetch(GITHUB_CONFIG.API_URL, {
                        headers: { 'Authorization': `token ${GITHUB_CONFIG.TOKEN}` }
                    });
                    if (getRes.ok) sha = (await getRes.json()).sha;
                } catch (e) {}
                
                // 2. Chuẩn bị dữ liệu
                const content = btoa(unescape(encodeURIComponent(
                    JSON.stringify(currentGames, null, 2)
                ));
                
                // 3. Gửi lên GitHub
                const response = await fetch(GITHUB_CONFIG.API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_CONFIG.TOKEN}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        message: `Cập nhật lúc ${new Date().toLocaleString()}`,
                        content,
                        sha
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || "Lỗi không xác định");
                }
                
                return true;
            } catch (error) {
                console.error("Lỗi lưu dữ liệu:", error);
                showNotification("Lỗi lưu dữ liệu: " + error.message, "error");
                return false;
            }
        }

        function renderGames() {
            const container = document.getElementById('gamesGrid');
            container.innerHTML = '';
            
            const gamesToShow = currentTab === 'all' 
                ? currentGames.all 
                : (currentGames[currentTab] || []);
            
            if (gamesToShow.length === 0) {
                container.innerHTML = '<p>Chưa có game nào trong tab này</p>';
                return;
            }
            
            gamesToShow.forEach(game => {
                container.innerHTML += `
                    <div class="game-card">
                        <h3>${game.title}</h3>
                        <p>${game.description}</p>
                        <p><a href="${game.link}" target="_blank" style="color: #00dbde;">Tải về</a></p>
                        ${game.customContent ? `<div class="custom-content">${game.customContent}</div>` : ''}
                        <small>Tab: ${game.tab || 'all'}</small>
                    </div>
                `;
            });
        }

        // ========= XỬ LÝ SỰ KIỆN ========= //
        function setupEventListeners() {
            // Chuyển tab
            document.querySelectorAll('.game-tab[data-tab]').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentTab = tab.dataset.tab;
                    document.querySelectorAll('.game-tab').forEach(t => 
                        t.classList.remove('active')
                    );
                    tab.classList.add('active');
                    renderGames();
                });
            });
            
            // Thêm game
            document.getElementById('addGameBtn').addEventListener('click', async () => {
                const gameData = {
                    id: Date.now(),
                    title: document.getElementById('gameTitle').value.trim(),
                    description: document.getElementById('gameDescription').value.trim(),
                    link: document.getElementById('gameLink').value.trim(),
                    tab: document.getElementById('gameTab').value,
                    customContent: ""
                };
                
                // Validate
                if (!gameData.title || !gameData.description || !gameData.link) {
                    showNotification("Vui lòng điền đủ thông tin", "error");
                    return;
                }
                
                try {
                    // Thêm vào danh sách
                    if (!currentGames[gameData.tab]) currentGames[gameData.tab] = [];
                    currentGames[gameData.tab].push(gameData);
                    currentGames.all.push(gameData);
                    
                    // Đồng bộ lên GitHub
                    const success = await saveGames();
                    if (success) {
                        showNotification("Đã thêm game thành công!");
                        renderGames();
                        // Reset form
                        document.getElementById('gameTitle').value = '';
                        document.getElementById('gameDescription').value = '';
                        document.getElementById('gameLink').value = '';
                    }
                } catch (error) {
                    console.error(error);
                }
            });
            
            // Thêm tab mới
            document.getElementById('addTabBtn').addEventListener('click', async () => {
                const tabName = prompt("Nhập tên tab mới:");
                if (tabName && !currentGames[tabName]) {
                    currentGames[tabName] = [];
                    const success = await saveGames();
                    if (success) {
                        showNotification(`Đã thêm tab "${tabName}"`);
                        // Thêm tab vào UI
                        const tabsContainer = document.getElementById('gameTabs');
                        const newTab = document.createElement('div');
                        newTab.className = 'game-tab';
                        newTab.dataset.tab = tabName;
                        newTab.textContent = tabName;
                        newTab.addEventListener('click', function() {
                            currentTab = tabName;
                            document.querySelectorAll('.game-tab').forEach(t => 
                                t.classList.remove('active')
                            );
                            this.classList.add('active');
                            renderGames();
                        });
                        tabsContainer.insertBefore(newTab, document.getElementById('addTabBtn'));
                    }
                }
            });
        }

        // ========= TIỆN ÍCH ========= //
        function showNotification(message, type = "success") {
            const noti = document.getElementById('notification');
            noti.textContent = message;
            noti.className = `notification ${type === "error" ? "error" : ""}`;
            noti.style.display = "block";
            
            setTimeout(() => {
                noti.style.display = "none";
            }, 3000);
        }
    </script>
</body>
</html>
